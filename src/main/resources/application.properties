spring.application.name=chatpress-v1

spring.datasource.url=jdbc:h2:file:./data/chatpress;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

jwt.secret=${JWT_SECRET:chatpress-v1-jwt-secret-key-2026-please-change-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=simple
chatpress.cache.public-page-ttl-minutes=60
chatpress.cache.null-cache-ttl-minutes=5

springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api/docs
springdoc.packages-to-scan=com.chatpress
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha

chatpress.api.title=ChatPress API
chatpress.api.version=1.0

mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.page.size=10
