spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/chatpress}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

# Use simple in-memory cache by default; set to redis when Redis is available
spring.cache.type=simple
chatpress.cache.public-page-ttl-minutes=60
chatpress.cache.null-cache-ttl-minutes=5
